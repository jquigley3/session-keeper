name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check script syntax
        run: |
          python3 -m py_compile skills/session-summary/scripts/sk-sessions.py
          python3 -m py_compile skills/token-manager/scripts/sk-tokens.py

      - name: Run unit tests
        run: python3 -m unittest discover -s test -p 'test_*.py' -v

      - name: Validate SKILL.md frontmatter
        run: |
          python3 - <<'EOF'
          import re, sys
          for skill in ("session-summary", "token-manager"):
              path = f"skills/{skill}/SKILL.md"
              text = open(path).read()
              fm = re.search(r"^---\n(.+?)\n---", text, re.DOTALL)
              if not fm:
                  print(f"{path}: missing frontmatter"); sys.exit(1)
              body = fm.group(1)
              for field in ("name:", "description:", "compatibility:"):
                  if field not in body:
                      print(f"{path}: missing '{field}'"); sys.exit(1)
              print(f"{path} frontmatter OK")
          EOF
